<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Stage 4: Geolocation → 3D</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>* { margin: 0; padding: 0; } body { overflow: hidden; background: #111; }</style>
</head>
<body><script>
// ============================================================
// STAGE 4 — GEOLOCATION → 3D
// ============================================================
// NEW in this stage:
//   • navigator.geolocation.watchPosition() for live GPS
//   • Storing a starting position and computing offsets
//   • Mapping tiny lat/lon changes to visible 3D movement
//   • Drawing a trail of past positions
//
// IMPORTANT: Geolocation requires HTTPS (GitHub Pages = fine).
// GPS is much less precise indoors — go outside!
// ============================================================

let startLat = null, startLon = null;
let currentLat = 0, currentLon = 0;
let geoAccuracy = 0;
let trail = []; // { x, y } offsets in meters

let info, btn;

function setup() {
  createCanvas(windowWidth, windowHeight, WEBGL);

  btn = createButton('Tap to Enable Location');
  btn.style('font-size', '20px');
  btn.style('padding', '20px 30px');
  btn.style('position', 'fixed');
  btn.style('top', '50%');
  btn.style('left', '50%');
  btn.style('transform', 'translate(-50%,-50%)');
  btn.style('z-index', '1000');
  btn.mousePressed(() => { btn.hide(); startGeo(); });

  info = createDiv('Waiting for GPS…');
  info.style('position', 'fixed');
  info.style('bottom', '10px');
  info.style('left', '10px');
  info.style('color', 'white');
  info.style('font-family', 'monospace');
  info.style('font-size', '13px');
  info.style('background', 'rgba(0,0,0,0.6)');
  info.style('padding', '8px');
  info.style('border-radius', '6px');
  info.style('z-index', '1000');
}

function startGeo() {
  if (!navigator.geolocation) {
    info.html('Geolocation not supported');
    return;
  }

  // watchPosition fires on every new GPS fix
  navigator.geolocation.watchPosition(
    (pos) => {
      currentLat = pos.coords.latitude;
      currentLon = pos.coords.longitude;
      geoAccuracy = pos.coords.accuracy;

      // Lock in starting position on first reading
      if (startLat === null) {
        startLat = currentLat;
        startLon = currentLon;
      }

      // ---------- LAT/LON → METERS ----------
      // 1° latitude  ≈ 111,320 m (roughly constant)
      // 1° longitude ≈ 111,320 * cos(lat) m
      let dLat = (currentLat - startLat) * 111320;
      let dLon = (currentLon - startLon) * 111320 * cos(radians(startLat));

      trail.push({ x: dLon, y: -dLat }); // -dLat → north = up
      if (trail.length > 500) trail.shift();
    },
    (err) => { info.html('GPS error: ' + err.message); },
    { enableHighAccuracy: true, maximumAge: 0 }
  );
}

function draw() {
  background(20);
  ambientLight(80);
  directionalLight(255, 255, 255, 0.5, 0.5, -1);

  // Angle the view to see the ground plane
  rotateX(0.4);

  // GPS offsets in meters are small — scale up for visibility
  // 1 meter = 20 pixels. Adjust for your space!
  let s = 20;

  // ---------- GROUND GRID ----------
  push();
    stroke(60);
    noFill();
    for (let i = -10; i <= 10; i++) {
      line(i * 50, -500, 0, i * 50, 500, 0);
      line(-500, i * 50, 0, 500, i * 50, 0);
    }
  pop();

  // ---------- TRAIL ----------
  if (trail.length > 1) {
    noFill();
    stroke(100, 200, 255);
    strokeWeight(2);
    beginShape();
    for (let pt of trail) vertex(pt.x * s, pt.y * s, 0);
    endShape();

    // Current position — red sphere
    let last = trail[trail.length - 1];
    push();
      translate(last.x * s, last.y * s, 30);
      noStroke();
      ambientMaterial(255, 100, 80);
      sphere(20);
    pop();

    // Start position — green box
    push();
      translate(trail[0].x * s, trail[0].y * s, 15);
      noStroke();
      ambientMaterial(100, 255, 100);
      box(15);
    pop();
  }

  if (startLat !== null) {
    info.html(
      `lat:${currentLat.toFixed(6)} lon:${currentLon.toFixed(6)} ` +
      `±${geoAccuracy.toFixed(0)}m | ${trail.length} pts`
    );
  }
}

function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script></body>
</html>

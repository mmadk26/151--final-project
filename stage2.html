<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Stage 2: Accelerometer → Rotation</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>* { margin: 0; padding: 0; } body { overflow: hidden; background: #111; }</style>
</head>
<body><script>
// ============================================================
// STAGE 2 — ACCELEROMETER → 3D ROTATION
// ============================================================
// NEW in this stage:
//   • DeviceMotionEvent to read accelerometer values
//   • iOS permission request (required since iOS 13+)
//   • Mapping sensor data to rotation angles
//   • lerp() for smoothing noisy sensor data
//
// Accelerometer gives us acceleration along 3 axes:
//   x → left/right tilt
//   y → forward/backward tilt
//   z → up/down (gravity is ~9.8 on z when flat)
// ============================================================

let accelX = 0, accelY = 0, accelZ = 0;
let smoothX = 0, smoothY = 0;
let info, btn;

function setup() {
  createCanvas(windowWidth, windowHeight, WEBGL);

  // ---------- iOS PERMISSION BUTTON ----------
  // iOS 13+ requires an explicit user tap to allow motion.
  // This MUST happen inside a click/touch handler.
  btn = createButton('Tap to Enable Motion');
  btn.style('font-size', '20px');
  btn.style('padding', '20px 30px');
  btn.style('position', 'fixed');
  btn.style('top', '50%');
  btn.style('left', '50%');
  btn.style('transform', 'translate(-50%,-50%)');
  btn.style('z-index', '1000');
  btn.mousePressed(requestMotion);

  info = createDiv('');
  info.style('position', 'fixed');
  info.style('bottom', '10px');
  info.style('left', '10px');
  info.style('color', 'white');
  info.style('font-family', 'monospace');
  info.style('font-size', '13px');
  info.style('background', 'rgba(0,0,0,0.6)');
  info.style('padding', '8px');
  info.style('border-radius', '6px');
  info.style('z-index', '1000');
}

async function requestMotion() {
  if (typeof DeviceMotionEvent !== 'undefined' &&
      typeof DeviceMotionEvent.requestPermission === 'function') {
    let perm = await DeviceMotionEvent.requestPermission();
    if (perm === 'granted') startListening();
  } else {
    startListening();
  }
  btn.hide();
}

function startListening() {
  window.addEventListener('devicemotion', (e) => {
    // accelerationIncludingGravity gives raw sensor values.
    // Flat table: x≈0, y≈0, z≈9.8
    let a = e.accelerationIncludingGravity;
    if (a) {
      accelX = a.x || 0;
      accelY = a.y || 0;
      accelZ = a.z || 0;
    }
  });
}

function draw() {
  background(20);
  ambientLight(60);
  directionalLight(255, 255, 255, 0.5, 0.5, -1);

  // ---------- SMOOTHING (lerp) ----------
  // Raw accel data is noisy. lerp() blends old + new.
  // Small factor (0.1) = more smooth, more lag.
  smoothX = lerp(smoothX, accelX, 0.1);
  smoothY = lerp(smoothY, accelY, 0.1);

  // ---------- MAPPING ACCEL → ROTATION ----------
  // Accel range ~[-10,10] → rotation ~[-PI/2, PI/2]
  let rotX = map(smoothY, -10, 10, -HALF_PI, HALF_PI);
  let rotY = map(smoothX, -10, 10, -HALF_PI, HALF_PI);

  rotateX(rotX);
  rotateY(rotY);
  normalMaterial();
  box(150);

  info.html(`x:${smoothX.toFixed(2)} y:${smoothY.toFixed(2)} z:${accelZ.toFixed(2)}`);
}

function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script></body>
</html>
